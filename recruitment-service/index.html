<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採用コンサルティング | 株式会社エニーフラッグ</title>
  <style>
    /* ─── Reset & Base ─────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'YuGothic', 'Yu Gothic', Meiryo, sans-serif;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; }

    /* ─── Header ────────────────────────────────── */
    header {
      background: #fff;
      padding: 20px 48px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    header .logo img {
      height: 34px;
    }

    header nav {
      display: flex;
      gap: 36px;
    }

    header nav a {
      color: #333;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    header nav a:hover {
      color: #e8601c;
    }

    /* ─── Hamburger ─────────────────────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 300;
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 2.5px;
      background: #1e3a6e;
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    /* ─── Mobile Nav Drawer ──────────────────────── */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 260px;
      height: 100%;
      background: #1e3a6e;
      z-index: 250;
      flex-direction: column;
      padding: 88px 40px 40px;
      gap: 32px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .mobile-nav.open { transform: translateX(0); }

    .mobile-nav a {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 18px;
      transition: color 0.2s;
    }

    .mobile-nav a:hover { color: #e8601c; }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 240;
    }

    .nav-overlay.open { display: block; }

    /* ─── Main ───────────────────────────────────── */
    main {
      flex: 1;
      background: #eef6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 88px 24px;
    }

    /* ─── Coming Soon Card ───────────────────────── */
    .coming-soon-card {
      background: #fff;
      border-radius: 24px;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
      overflow: hidden; /* 画像を角丸に合わせてクリップ */
    }

    /* 上部：アイキャッチ画像 ＋ バッジ重ね */
    .eyecatch-wrap {
      position: relative;
      line-height: 0;
    }

    .card-eyecatch {
      width: 100%;
      display: block;
    }

    /* COMING SOON バッジ（画像中央に絶対配置） */
    .badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #e8601c;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 16px 48px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* 下部：テキストコンテンツ */
    .card-body {
      padding: 48px 80px 64px;
    }

    .coming-soon-card .message {
      font-size: 20px;
      font-weight: 700;
      color: #444;
      line-height: 1.9;
      margin-bottom: 8px;
    }

    .coming-soon-card .sub {
      font-size: 14px;
      color: #888;
      line-height: 1.9;
      margin-bottom: 44px;
    }

    /* 戻るボタン */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 2px solid #1e3a6e;
      border-radius: 999px;
      padding: 11px 28px;
      font-size: 15px;
      font-weight: 700;
      color: #1e3a6e;
      letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s;
    }

    .btn-back:hover {
      background: #1e3a6e;
      color: #fff;
    }

    .btn-back .arrow-circle {
      width: 22px;
      height: 22px;
      background: #1e3a6e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .btn-back:hover .arrow-circle {
      background: #fff;
      color: #1e3a6e;
    }

    /* ─── Footer ─────────────────────────────────── */
    footer {
      background: #1e3a6e;
      padding: 36px 48px 20px;
    }

    .footer-main {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
    }

    footer nav {
      display: flex;
      gap: 32px;
    }

    footer nav a {
      color: rgba(255, 255, 255, 0.85);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    footer nav a:hover { color: #fff; }

    .footer-logo svg {
      height: 34px;
      width: auto;
    }

    .footer-copyright {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 16px;
    }

    /* ─── Mobile Responsive（〜767px）────────────── */
    @media (max-width: 767px) {
      header {
        padding: 14px 20px;
      }

      header nav { display: none; }
      .hamburger { display: flex; }
      .mobile-nav { display: flex; }

      main {
        padding: 52px 20px;
        align-items: flex-start;
      }

      .card-body {
        padding: 36px 24px 48px;
      }

      .coming-soon-card .message {
        font-size: 18px;
      }

      footer {
        padding: 32px 20px 16px;
      }

      .footer-main {
        flex-direction: column-reverse;
        gap: 20px;
        align-items: center;
        padding-bottom: 20px;
      }

      footer nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
      }

      footer nav a {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ドロワー背景オーバーレイ -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- モバイルナビ ドロワー -->
  <nav class="mobile-nav" id="mobileNav">
    <a href="../index.html#service" class="nav-link-sp">Service</a>
    <a href="../index.html#company" class="nav-link-sp">Company</a>
    <a href="../index.html#contact" class="nav-link-sp">Contact</a>
  </nav>

  <!-- ═══════════ Header ═══════════ -->
  <header>
    <div class="logo">
      <a href="../index.html">
        <img src="../images/logo_anyflag_横_trimmed.png" alt="AnyFlag">
      </a>
    </div>
    <nav>
      <a href="../index.html#service">Service</a>
      <a href="../index.html#company">Company</a>
      <a href="../index.html#contact">Contact</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- ═══════════ Main ═══════════ -->
  <main>
    <div class="coming-soon-card">

      <!-- 上部：アイキャッチ画像 ＋ COMING SOON バッジ -->
      <div class="eyecatch-wrap">
        <img src="../images/eyecatch2.png" alt="採用コンサルティング" class="card-eyecatch">
        <div class="badge">COMING SOON</div>
      </div>

      <!-- 下部：テキストコンテンツ -->
      <div class="card-body">
        <p class="message">このページは現在準備中です。</p>
        <p class="sub">
          サービスの詳細については近日公開予定です。<br>
          もうしばらくお待ちください。
        </p>

        <a href="../index.html" class="btn-back">
          トップページへ戻る
          <span class="arrow-circle">→</span>
        </a>
      </div>

    </div>
  </main>

  <!-- ═══════════ Footer ═══════════ -->
  <footer>
    <div class="footer-main">
      <nav>
        <a href="../index.html#service">Service</a>
        <a href="../index.html#company">Company</a>
        <a href="../index.html#contact">Contact</a>
      </nav>
      <div class="footer-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 62" role="img" aria-label="AnyFlag">
          <rect x="0"  y="0"  width="26" height="26" rx="2" fill="#ffffff"/>
          <rect x="29" y="0"  width="26" height="26" rx="2" fill="#e8601c"/>
          <rect x="0"  y="29" width="26" height="26" rx="2" fill="#e8601c"/>
          <rect x="29" y="29" width="26" height="26" rx="2" fill="#ffffff"/>
          <text x="66" y="46"
                font-family="'Helvetica Neue', Arial, sans-serif"
                font-weight="800"
                font-size="36"
                fill="#ffffff"
                letter-spacing="-0.5">AnyFlag</text>
        </svg>
      </div>
    </div>
    <div class="footer-copyright">
      © All Rights Reserved AnyFlag, Inc.
    </div>
  </footer>

  <script>
    const hamburger  = document.getElementById('hamburger');
    const mobileNav  = document.getElementById('mobileNav');
    const navOverlay = document.getElementById('navOverlay');

    function openMenu() {
      hamburger.classList.add('open');
      mobileNav.classList.add('open');
      navOverlay.classList.add('open');
      hamburger.setAttribute('aria-label', 'メニューを閉じる');
    }

    function closeMenu() {
      hamburger.classList.remove('open');
      mobileNav.classList.remove('open');
      navOverlay.classList.remove('open');
      hamburger.setAttribute('aria-label', 'メニューを開く');
    }

    hamburger.addEventListener('click', () => {
      mobileNav.classList.contains('open') ? closeMenu() : openMenu();
    });

    navOverlay.addEventListener('click', closeMenu);

    document.querySelectorAll('.nav-link-sp').forEach(link => {
      link.addEventListener('click', closeMenu);
    });
  </script>

</body>
</html>
